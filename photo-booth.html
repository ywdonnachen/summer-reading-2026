<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏日閱讀探索拍貼機</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #faf8f5; padding: 20px; }
        #canvas-container { margin: 20px auto; border: 1px solid #ccc; max-width: 100%; }
        canvas { 
            max-width: 100%; 
            height: auto; 
            touch-action: none; /* 防止手機滑動時整個網頁跟著上下滾動 */
            cursor: grab;
        }
        canvas:active { cursor: grabbing; }
        .controls { margin-top: 20px; }
    </style>
</head>
<body>
  <h1>夏日閱讀探索</h1>
  <p>上傳一張照片，可利用滑鼠或手指進行縮放與拖曳調整</p>
  <input type="file" id="upload" accept="image/*">
  <br><br>
  
  <canvas id="canvas" width="1200" height="900"></canvas>
  <div class="controls">
    <button onclick="downloadImage()">下載成品</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const upload = document.getElementById('upload');
    
    const frame = new Image();
    frame.src = 'frame.png'; 
    frame.onload = () => redraw(); // 等框框載入後先畫一次

    let currentImg = null;
    
    // 照片控制變數（將基準尺寸放大至與相框挖空區域相同，並設定初始縮放填滿）
    let imgScale = 1.2;
    let imgX = 0;
    let imgY = 0;
    let baseWidth = 1200;
    let baseHeight = 900;

    // 重新繪製畫布的核心函式
    function redraw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 1. 如果有上傳照片，根據目前的位移與縮放繪製
      if (currentImg) {
        ctx.save();
        // 限制照片繪製區域 (依照相框挖空區域：x=100, y=100, 寬1000, 高700)
        ctx.beginPath();
        ctx.rect(100, 100, 1000, 700);
        ctx.clip();

        const w = baseWidth * imgScale;
        const h = baseHeight * imgScale;
        ctx.drawImage(currentImg, imgX, imgY, w, h);
        ctx.restore();
      }

      // 2. 畫上拍貼機透明外框
      if (frame.complete) {
        ctx.drawImage(frame, 0, 0, 1200, 900);
      }
    }

    // 讀取上傳的圖片
    upload.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          currentImg = img;
          // 初始化圖片位置與預設縮放（上傳新照片時自動置中並填滿）
          imgScale = 1.2;
          imgX = 0;
          imgY = 0;
          redraw();
        }
        img.src = event.target.result;
      }
      reader.readAsDataURL(file);
    });

    // --- 互動控制：滑鼠與觸控事件 ---
    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let initialPinchDistance = null;

    // 電腦滑鼠：按下開始拖曳
    canvas.addEventListener('mousedown', (e) => {
      if (!currentImg) return;
      isDragging = true;
      startX = e.clientX - imgX;
      startY = e.clientY - imgY;
    });

    // 電腦滑鼠：移動中
    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      imgX = e.clientX - startX;
      imgY = e.clientY - startY;
      redraw();
    });

    // 電腦滑鼠：放開結束拖曳
    window.addEventListener('mouseup', () => {
      isDragging = false;
    });

    // 電腦滑鼠：滾輪縮放
    canvas.addEventListener('wheel', (e) => {
      if (!currentImg) return;
      e.preventDefault();

      const zoomFactor = 1.1;

      if (e.deltaY < 0) {
        imgScale = Math.min(imgScale * zoomFactor, 5); // 最大放大 5 倍
      } else {
        imgScale = Math.max(imgScale / zoomFactor, 0.2); // 最小縮小 0.2 倍
      }

      redraw();
    }, { passive: false });

    // --- 手機觸控支援 ---
    canvas.addEventListener('touchstart', (e) => {
      if (!currentImg) return;
      if (e.touches.length === 1) {
        isDragging = true;
        startX = e.touches[0].clientX - imgX;
        startY = e.touches[0].clientY - imgY;
      } else if (e.touches.length === 2) {
        isDragging = false;
        initialPinchDistance = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
      }
    });

    canvas.addEventListener('touchmove', (e) => {
      if (!currentImg) return;
      if (e.touches.length === 1 && isDragging) {
        imgX = e.touches[0].clientX - startX;
        imgY = e.touches[0].clientY - startY;
        redraw();
      } else if (e.touches.length === 2 && initialPinchDistance) {
        e.preventDefault();
        const currentDistance = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        const factor = currentDistance / initialPinchDistance;
        imgScale = Math.min(Math.max(imgScale * (factor > 1 ? 1.02 : 0.98), 0.2), 5);
        initialPinchDistance = currentDistance;
        redraw();
      }
    }, { passive: false });

    canvas.addEventListener('touchend', () => {
      isDragging = false;
      initialPinchDistance = null;
    });

    function downloadImage() {
      const link = document.createElement('a');
      link.download = 'my-summer-photo.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
