<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏日閱讀探索拍貼機</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #faf8f5; padding: 20px; }
        #canvas-container { margin: 20px auto; border: 1px solid #ccc; max-width: 100%; }
        canvas { max-width: 100%; height: auto; }
        .controls { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>夏日閱讀探索</h1>
    <p>上傳一張照片，自動套用拍貼風格框</p>
    
    <input type="file" id="upload" accept="image/*">
    <br><br>
    <canvas id="canvas" width="800" height="1000"></canvas>
    
    <div class="controls">
        <button onclick="downloadImage()">下載成品</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const upload = document.getElementById('upload');
        const frame = new Image();
        frame.src = 'frame.png'; // 確保你的檔案名稱與此一致

        upload.addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // 1. 先畫照片 (假設照片填滿指定區域)
                    ctx.drawImage(img, 50, 50, 700, 900);
                    // 2. 再畫你的透明套版 PNG
                    ctx.drawImage(frame, 0, 0, 800, 1000);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'my-summer-photo.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
