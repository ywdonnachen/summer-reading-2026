<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏日閱讀探索拍貼機</title>
    <style>
        /* 採用夏日閱讀小旅行的自然綠意與清新色調風格 */
        html, body {
            margin: 0;
            padding: 0;
            background: #f4f8ec;
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            color: #2f4633;
            text-align: center;
        }

        .booth-container {
            max-width: 760px;
            margin: 0 auto;
            padding: 48px 20px;
            box-sizing: border-box;
        }

        /* Logo 樣式 */
        .trip-logo {
            display: block;       
            margin: 0 auto 15px;  
            width: 180px;         
            height: auto;         
        } 

        h3 {
            font-size: 1.2rem;   
            color: #4d7a52;      
            margin-bottom: 8px;  
        }

        h1 {
            font-size: 2.2rem;
            color: #3f6b45;
            margin-top: 0;
            margin-bottom: 12px;
        }

        .intro {
            line-height: 1.9;
            color: #5d705f;
            margin-bottom: 24px;
        }

        #canvas-container {
            margin: 20px auto;
            max-width: 100%;
        }

        /* 拍立得拍貼機外框風格 */
        canvas {
            max-width: 100%;
            height: auto;
            touch-action: none; /* 防止手機滑動時整個網頁跟著上下滾動 */
            cursor: grab;
            background-color: #ffffff;
            padding: 12px 12px 45px 12px; /* 下方留白營造拍立得底片感 */
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2ebd5;
        }

        canvas:active {
            cursor: grabbing;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* 按鈕樣式（對齊主題網的設計） */
        .trip-btn {
            background: #6a9a6f;
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 14px 28px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.25s;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(106, 154, 111, 0.2);
        }

        .trip-btn:hover {
            transform: translateY(-2px);
            background: #587f5d;
        }

        .trip-btn:active {
            transform: translateY(0);
        }

        /* 外框樣式按鈕 */
        .trip-btn.outline {
            background: transparent;
            color: #6a9a6f;
            border: 1px solid #6a9a6f;
            box-shadow: none;
        }

        .trip-btn.outline:hover {
            background: #6a9a6f;
            color: #fff;
        }

        /* 上傳檔案按鈕外觀美化 */
        input[type="file"] {
            padding: 12px 20px;
            background: #fff;
            border: 2px dashed #6a9a6f;
            border-radius: 999px;
            cursor: pointer;
            color: #4d7a52;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        input[type="file"]:hover {
            background: #f9fbf4;
        }

        /* RWD 手機版響應式微調 */
        @media (max-width: 600px) {
            .booth-container {
                padding: 36px 16px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .controls {
                flex-direction: column;
                align-items: center;
                width: 100%;
            }
            .trip-btn {
                width: 100%;
                max-width: 280px;
                box-sizing: border-box;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="booth-container">
        <!-- 導入主題網的 Logo -->
        <img class="trip-logo" src="https://www.library.taichung.gov.tw/images/logo.svg" alt="台中圖書館 Logo">
        
        <h3>🌳 閱讀之森—夏日閱讀探索</h3>
        <h1>📸 夏日閱讀拍貼機</h1>
        <p class="intro">
            上傳一張照片，打造你的專屬夏日閱讀拍貼。<br>
            （可利用滑鼠或手機觸控進行縮放與拖曳）
        </p>

        <input type="file" id="upload" accept="image/*">
        <br><br>

        <div id="canvas-container">
            <canvas id="canvas" width="1200" height="900"></canvas>
        </div>

        <div class="controls">
            <button class="trip-btn" onclick="downloadImage()">📥 下載成品</button>
            <button class="trip-btn outline" onclick="window.location.href='https://ywdonnachen.github.io/summer-reading-2026/'">🏠 回到夏日閱讀主題網</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const upload = document.getElementById('upload');
        
        const frame = new Image();
        frame.src = 'frame.png';
        frame.onload = () => redraw(); // 等框框載入後先畫一次

        let currentImg = null; // 照片控制變數
        let imgScale = 1;
        let imgX = 0;
        let imgY = 0;
        let imgDrawWidth = 1200;
        let imgDrawHeight = 900;

        // 重新繪製畫布的核心函式
        function redraw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 先畫上傳的照片在底層（維持等比例）
            if (currentImg) {
                ctx.save();
                const w = imgDrawWidth * imgScale;
                const h = imgDrawHeight * imgScale;
                ctx.drawImage(currentImg, imgX, imgY, w, h);
                ctx.restore();
            }

            // 2. 再把拍貼機透明外框蓋在最上層
            if (frame.complete) {
                ctx.drawImage(frame, 0, 0, 1200, 900);
            }
        }

        // 讀取上傳的圖片（自動計算等比例尺寸，預設完整包覆畫面）
        upload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    currentImg = img;
                    
                    // 計算等比例寬高，讓圖片初始時能完美覆蓋 1200x900 區域
                    const canvasAspect = canvas.width / canvas.height;
                    const imgAspect = img.width / img.height;

                    if (imgAspect > canvasAspect) {
                        imgDrawHeight = canvas.height;
                        imgDrawWidth = canvas.height * imgAspect;
                        imgX = (canvas.width - imgDrawWidth) / 2;
                        imgY = 0;
                    } else {
                        imgDrawWidth = canvas.width;
                        imgDrawHeight = canvas.width / imgAspect;
                        imgX = 0;
                        imgY = (canvas.height - imgDrawHeight) / 2;
                    }

                    imgScale = 1;
                    redraw();
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // --- 互動控制：滑鼠與觸控事件 ---
        let isDragging = false;
        let startX = 0;
        let startY = 0;
        let initialPinchDistance = null;

        canvas.addEventListener('mousedown', (e) => {
            if (!currentImg) return;
            isDragging = true;
            startX = e.clientX - imgX;
            startY = e.clientY - imgY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            imgX = e.clientX - startX;
            imgY = e.clientY - startY;
            redraw();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        canvas.addEventListener('wheel', (e) => {
            if (!currentImg) return;
            e.preventDefault();
            const zoomFactor = 1.1;
            if (e.deltaY < 0) {
                imgScale = Math.min(imgScale * zoomFactor, 5);
            } else {
                imgScale = Math.max(imgScale / zoomFactor, 0.2);
            }
            redraw();
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            if (!currentImg) return;
            if (e.touches.length === 1) {
                isDragging = true;
                startX = e.touches[0].clientX - imgX;
                startY = e.touches[0].clientY - imgY;
            } else if (e.touches.length === 2) {
                isDragging = false;
                initialPinchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!currentImg) return;
            if (e.touches.length === 1 && isDragging) {
                imgX = e.touches[0].clientX - startX;
                imgY = e.touches[0].clientY - startY;
                redraw();
            } else if (e.touches.length === 2 && initialPinchDistance) {
                e.preventDefault();
                const currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const factor = currentDistance / initialPinchDistance;
                imgScale = Math.min(Math.max(imgScale * (factor > 1 ? 1.02 : 0.98), 0.2), 5);
                initialPinchDistance = currentDistance;
                redraw();
            }
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
            initialPinchDistance = null;
        });

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'my-summer-reading-photo.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>

</body>
</html>
